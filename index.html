<title>Álbum de iguanitos :3</title>

<style>

/* COLLAGE */

.galeria{
column-count:5;
column-gap:0;
}

.galeria img{
width:63%;
padding:2px;
cursor:pointer;
transition:0.3s;
}

.galeria img:hover{
opacity:0.8;
}

/* VISOR */

#visor{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
}

#visor img{
max-width:95%;
max-height:95%;
opacity:0;
transition:opacity 0.6s ease;
}

#visor img.mostrar{
opacity:1;
}

</style>
</head>

img.src=src

img.onclick=()=>abrirImagen(i)

galeria.appendChild(img)

})

/* VISOR */

let indiceActual=0
let carrusel

function abrirImagen(i){

indiceActual=i

const visor=document.getElementById("visor")

visor.style.display="flex"

mostrarImagen()

carrusel=setInterval(siguienteImagen,3000)

}

function mostrarImagen(){

const imgGrande=document.getElementById("imgGrande")

imgGrande.classList.remove("mostrar")

setTimeout(()=>{

imgGrande.src=imagenes[indiceActual]

imgGrande.onload=()=>imgGrande.classList.add("mostrar")

},200)

}

function siguienteImagen(){

indiceActual++

if(indiceActual>=imagenes.length){
indiceActual=0
}

mostrarImagen()

}

function cerrar(){

clearInterval(carrusel)

document.getElementById("visor").style.display="none"
