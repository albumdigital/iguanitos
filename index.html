<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Álbum</title>

<style>

body{
margin:0;
background:black;
font-family:sans-serif;
}

/* COLLAGE */

.galeria{
column-count:5;
column-gap:0;
}

.galeria img{
width:100%;
padding:2px;
cursor:pointer;
transition:0.3s;
}

.galeria img:hover{
opacity:0.8;
}

/* VISOR */

#visor{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
}

#visor img{
max-width:95%;
max-height:95%;
}

</style>
</head>

<body>

<div class="galeria" id="galeria"></div>

<div id="visor" onclick="cerrar()">
<img id="imgGrande">
</div>

<script>

const imagenes = [
"fotos/foto (1).jpg",
"fotos/foto (2).jpg",
"fotos/foto (3).jpg",
"fotos/foto (4).jpg",
"fotos/foto (5).jpg"
]

/* ORDEN ALEATORIO */

imagenes.sort(()=>Math.random()-0.5)

const galeria = document.getElementById("galeria")

imagenes.forEach(src=>{

const img=document.createElement("img")
img.src=src

img.onclick=()=>{
document.getElementById("visor").style.display="flex"
document.getElementById("imgGrande").src=src
}

galeria.appendChild(img)

})

function cerrar(){
document.getElementById("visor").style.display="none"
}

</script>

</body>
</html>
